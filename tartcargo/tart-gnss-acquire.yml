_include:
    - genesis/tart-cargo-base.yml

cabs:
    tart-gnss-acquire:
        image:
            _use: vars.tart-cargo.images
            name: tools
        command: tart-gnss-acquire
        info: Calculate signal strengths, phases and doppler offsets for GPS, Galilea, Beidou and SBAS constellations
        inputs:
            file:
                dtype: File
                required: true
                info: A raw data file in .hdf format, downloaded from a TART
            gps:
                dtype: bool
                info: Acquire the GPS L1 C/A signal
            galileo:
                dtype: bool
                info: Acquire the Galileo L1 signal
            beidou:
                dtype: bool
                info: Acquire the Beidou L1 signal
            sbas:
                dtype: bool
                info: Acquire the SBAS L1 signal
            qzss:
                dtype: bool
                info: Acquire the QZSS L1 signal
            l1c:
                dtype: bool
                info: Acquire the GPS L1C signal
            all:
                dtype: bool
                info: Acquire the all the signals in the L1 band
            cn0:
                dtype: bool
                info:  With C/N0 estimation (slow, using the ABS method)
            prn:
                dtype: List[int]
                info: Only use the specified list of PRN numbers in the search.
            filter-freq-mad:
                dtype: float
                info: Ignore satellites with a Doppler Median Absolute Deviation greater than this value.
            filter-phase-mad:
                dtype: float
                info: Ignore satellites with a Phase Median Absolute Deviation greater than this value.
            output:
                dtype: File
                must_exist: false
                info: Set the name of the JSON output file

