_include:
    - genesis/tart-cargo-base.yml

cabs:
    tartball:
        name: tartball
        image:
            _use: vars.tart-cargo.images
            name: tartball
            version: 0.3.1
        command: tartball
        info: Predict visibilities from a sky model using the DiSkO healpix telescope operator.

        inputs:
            model:
                dtype: File
                required: true
                must_exist: true
                info: Path to sky model JSON file (az/el sources with fluxes).
            ms:
                dtype: str
                default: tartball.ms
                info: Output measurement set name.
            api:
                dtype: str
                required: false
                info: TART telescope API URL for info and antenna positions.
            info:
                dtype: File
                required: false
                must_exist: true
                info: Path to JSON telescope info file (alternative to api).
            antenna-positions:
                dtype: File
                required: false
                must_exist: true
                info: Path to JSON antenna positions file (alternative to api).
            gains:
                dtype: File
                required: false
                must_exist: true
                info: Path to JSON calibration gains file (optional; unity gains if omitted).
            fov:
                dtype: str
                default: 180deg
                info: Field of view (e.g. 10deg, 30arcmin, 180deg).
            res:
                dtype: str
                default: 2deg
                info: Maximum resolution of the sky (e.g. 1deg, 30arcmin, 2arcmin).
            nside:
                dtype: int
                required: false
                info: Healpix nside parameter (overrides fov/res for pixel count).
            noise:
                dtype: float
                default: 0.0
                info: Standard deviation of additive complex Gaussian noise.
            beam:
                dtype: File
                required: false
                must_exist: true
                info: Path to beam JSON file, or 'tart' for the built-in TART beam pattern.
            clobber:
                dtype: bool
                default: false
                info: Overwrite output MS if it exists.
            debug:
                dtype: bool
                default: false
                info: Enable debug logging.

        outputs:
            ms:
                dtype: MS
                info: Output measurement set with predicted visibilities in the DATA column.
