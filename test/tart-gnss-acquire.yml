#!/usr/bin/env -S stimela run -l
# This basic TART Stimela 2.0 processing pipeline that sets the TART into raw mode long enough to acquire some raw data. then
# sets it back to vis mode.
opts:
    log:
        dir: logs/log-{config.run.datetime}
        name: log-{info.fqname}
        nest: 2
        symlink: log

_include:
    - (tartcargo):
        - tart-download-data.yml
        - tart-gnss-acquire.yml
        - tart-set-mode.yml

cabs:
    sleep:
        info: Wait a few seconds
        flavour:
            kind: python-code
        command: |
            import time
            time.sleep(5)
        inputs:
            seconds: float


gnss-acquire:
    info: TART imaging using stimela

    inputs:
        tart:
            dtype: str
            required: true
            info: "TART name (e.g. mu-udm)"
        pw:
            dtype: str
            required: true
            info: "TART password"

    outputs:
        sv:
            dtype: File
            default:  '{current.tart}-acquire.json'
        hdf:
            dtype: File
            default: '{current.tart}-raw.hdf'

    assign:
        api: 'https://api.elec.ac.nz/tart/{recipe.tart}'

    steps:

        set-raw-mode:
            skip: =EXISTS(recipe.hdf)
            cab: tart-set-mode
            params:
                api: =recipe.api
                pw: =recipe.pw
                raw: true

        pause:
            skip: =EXISTS(recipe.hdf)
            cab: sleep

        set-vis-mode:
            skip: =EXISTS(recipe.hdf)
            cab: tart-set-mode
            params:
                api: =recipe.api
                pw: =recipe.pw
                vis: true

        download-raw:
            cab: tart-download-data
            skip: =EXISTS(recipe.hdf)
            params:
                api: =recipe.api
                raw: true
                file: =recipe.hdf


        acquire-gnss:
            cab: tart-gnss-acquire
            params:
                file: =steps.download-raw.file
                output: =recipe.sv
                all: true
                # ant: 0
                cn0: true
                filter-phase-mad: 0.1

